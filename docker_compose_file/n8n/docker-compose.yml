services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      
      #private:
      #- WEBHOOK_URL=http://localhost:5678/ 

      #public:
      - WEBHOOK_URL=https://catkinate-craftiest-cara.ngrok-free.dev #if you get another url on ngrok copy it to here instead

volumes:
  n8n_data: